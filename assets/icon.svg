<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#0f172a"/>

  <!-- Truck body (cargo area) -->
  <rect x="28" y="90" width="130" height="80" rx="6" fill="#1e40af"/>
  <rect x="30" y="92" width="126" height="76" rx="4" fill="#2563eb"/>

  <!-- Cargo door lines -->
  <line x1="93" y1="94" x2="93" y2="166" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="60" y1="94" x2="60" y2="166" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="126" y1="94" x2="126" y2="166" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Cab -->
  <path d="M158 120 L158 170 L228 170 L228 120 Z" fill="#1e40af"/>
  <path d="M160 120 L160 168 L226 168 L226 120 Z" fill="#2563eb"/>

  <!-- Cab roof curve -->
  <path d="M158 120 Q175 88 210 88 L228 95 L228 120 Z" fill="#1e40af"/>
  <path d="M160 120 Q177 90 210 90 L226 97 L226 120 Z" fill="#3b82f6"/>

  <!-- Windshield -->
  <path d="M166 118 Q180 96 210 94 L222 100 L222 118 Z" fill="#93c5fd" opacity="0.85"/>

  <!-- Side window -->
  <rect x="163" y="124" width="30" height="28" rx="3" fill="#93c5fd" opacity="0.7"/>

  <!-- Door handle -->
  <rect x="185" y="138" width="10" height="3" rx="1.5" fill="#1d4ed8"/>

  <!-- Chassis / undercarriage -->
  <rect x="28" y="168" width="200" height="12" rx="3" fill="#1e3a8a"/>

  <!-- Front bumper -->
  <rect x="220" y="160" width="14" height="20" rx="3" fill="#1e3a8a"/>

  <!-- Headlight -->
  <rect x="223" y="108" width="10" height="8" rx="2" fill="#fef08a"/>
  <rect x="224" y="109" width="8" height="6" rx="1" fill="#fde047"/>

  <!-- Front grill -->
  <rect x="223" y="125" width="10" height="18" rx="2" fill="#1e3a8a"/>
  <line x1="225" y1="128" x2="231" y2="128" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="225" y1="132" x2="231" y2="132" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="225" y1="136" x2="231" y2="136" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="225" y1="140" x2="231" y2="140" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Rear wheels -->
  <circle cx="68" cy="182" r="22" fill="#0f172a"/>
  <circle cx="68" cy="182" r="18" fill="#374151"/>
  <circle cx="68" cy="182" r="10" fill="#1f2937"/>
  <circle cx="68" cy="182" r="5" fill="#6b7280"/>

  <circle cx="110" cy="182" r="22" fill="#0f172a"/>
  <circle cx="110" cy="182" r="18" fill="#374151"/>
  <circle cx="110" cy="182" r="10" fill="#1f2937"/>
  <circle cx="110" cy="182" r="5" fill="#6b7280"/>

  <!-- Front wheels -->
  <circle cx="200" cy="182" r="22" fill="#0f172a"/>
  <circle cx="200" cy="182" r="18" fill="#374151"/>
  <circle cx="200" cy="182" r="10" fill="#1f2937"/>
  <circle cx="200" cy="182" r="5" fill="#6b7280"/>

  <!-- Exhaust pipe -->
  <rect x="148" y="72" width="8" height="22" rx="4" fill="#374151"/>
  <ellipse cx="152" cy="72" rx="4" ry="3" fill="#4b5563"/>

  <!-- "LIBRA" text on cargo -->
  <text x="80" y="140" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="#93c5fd" text-anchor="middle" letter-spacing="3">LIBRA</text>

  <!-- Speed lines (motion effect) -->
  <line x1="8" y1="130" x2="28" y2="130" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="4" y1="145" x2="28" y2="145" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="12" y1="115" x2="28" y2="115" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
